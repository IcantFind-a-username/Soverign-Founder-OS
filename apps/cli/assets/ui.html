<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sovereign Founder OS</title>
<style>
  :root {
    color-scheme: dark;
    --surface: #1a1a19;
    --panel: #232322;
    --panel-edge: #33332f;
    --ink: #ffffff;
    --ink-2: #c3c2b7;
    --ink-3: #8a897f;
    --good: #0ca30c;
    --warn: #fab219;
    --critical: #d03b3b;
    --accent: #3987e5;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--surface); color: var(--ink);
    font: 15px/1.5 var(--sans);
    padding: 28px clamp(16px, 4vw, 48px) 64px;
    max-width: 1100px; margin-inline: auto;
  }
  .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; }
  header h1 { font-size: 20px; font-weight: 650; letter-spacing: .2px; }
  header .sub { color: var(--ink-2); margin-top: 4px; }
  header .honest { color: var(--ink-3); font-size: 13px; margin-top: 10px; max-width: 70ch; }
  .lang { display: flex; border: 1px solid var(--panel-edge); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
  .lang button { background: transparent; color: var(--ink-2); border: 0; font: 600 13px/1 var(--sans); padding: 8px 14px; cursor: pointer; }
  .lang button.active { background: var(--panel-edge); color: var(--ink); }
  nav.tabs { display: flex; gap: 8px; margin: 22px 0 4px; border-bottom: 1px solid var(--panel-edge); }
  nav.tabs button {
    background: transparent; color: var(--ink-3); border: 0; border-bottom: 2px solid transparent;
    font: 650 15px/1 var(--sans); padding: 10px 14px; cursor: pointer;
  }
  nav.tabs button.active { color: var(--ink); border-bottom-color: var(--accent); }
  .tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin: 22px 0; }
  .tile { background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 10px; padding: 14px 16px; }
  .tile .label { color: var(--ink-3); font-size: 12px; text-transform: uppercase; letter-spacing: .6px; }
  .tile .value { font-size: 26px; font-weight: 650; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .tile .meta { color: var(--ink-2); font-size: 13px; margin-top: 2px; overflow-wrap: anywhere; }
  section { margin-top: 28px; }
  section > h2 { font-size: 15px; font-weight: 650; color: var(--ink-2); margin-bottom: 10px; }
  .panel { background: var(--panel); border: 1px solid var(--panel-edge); border-radius: 10px; overflow: hidden; }
  .panel.pad { padding: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 9px 14px; border-top: 1px solid var(--panel-edge); }
  thead th { border-top: none; color: var(--ink-3); font-size: 12px; text-transform: uppercase; letter-spacing: .6px; font-weight: 600; }
  td.mono, .mono { font-family: var(--mono); font-size: 13px; color: var(--ink-2); }
  .empty { padding: 16px; color: var(--ink-3); }
  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; border-radius: 999px; padding: 2px 10px; }
  .badge.good { color: var(--good); background: color-mix(in srgb, var(--good) 14%, transparent); }
  .badge.bad { color: var(--critical); background: color-mix(in srgb, var(--critical) 14%, transparent); }
  .badge.warn { color: var(--warn); background: color-mix(in srgb, var(--warn) 14%, transparent); }
  .badge.neutral { color: var(--ink-2); background: color-mix(in srgb, var(--ink-2) 12%, transparent); }
  button.primary { background: var(--accent); color: #fff; border: 0; border-radius: 8px; font: 600 14px/1 var(--sans); padding: 10px 18px; cursor: pointer; }
  button.primary:disabled { opacity: .55; cursor: wait; }
  button.ghost { background: transparent; color: var(--ink-2); border: 1px solid var(--panel-edge); border-radius: 8px; font: 600 14px/1 var(--sans); padding: 10px 18px; cursor: pointer; }
  button.small { padding: 7px 12px; font-size: 13px; }
  button.approve { background: color-mix(in srgb, var(--good) 22%, transparent); color: var(--good); border: 1px solid color-mix(in srgb, var(--good) 40%, transparent); border-radius: 8px; font: 600 13px/1 var(--sans); padding: 7px 12px; cursor: pointer; }
  button.reject { background: color-mix(in srgb, var(--critical) 18%, transparent); color: var(--critical); border: 1px solid color-mix(in srgb, var(--critical) 40%, transparent); border-radius: 8px; font: 600 13px/1 var(--sans); padding: 7px 12px; cursor: pointer; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  input[type=text], textarea, select {
    background: var(--surface); color: var(--ink); border: 1px solid var(--panel-edge);
    border-radius: 8px; font: 14px/1.4 var(--sans); padding: 9px 12px; width: 100%;
  }
  textarea { resize: vertical; min-height: 64px; }
  .form-grid { display: grid; gap: 10px; }
  .form-row { display: grid; gap: 10px; grid-template-columns: 1fr auto; align-items: end; }
  label { display: block; color: var(--ink-3); font-size: 12px; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; }
  .doc { border-top: 1px solid var(--panel-edge); padding: 12px 14px; }
  .doc:first-child { border-top: none; }
  .doc-head { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .doc-head .title { font-weight: 600; flex: 1; min-width: 200px; }
  .doc details { margin-top: 8px; }
  .doc summary { color: var(--ink-3); font-size: 13px; cursor: pointer; }
  .doc pre { background: var(--surface); border: 1px solid var(--panel-edge); border-radius: 8px; padding: 12px; margin-top: 8px; font: 13px/1.5 var(--mono); color: var(--ink-2); white-space: pre-wrap; }
  .approval { display: grid; grid-template-columns: 1fr auto; gap: 10px 16px; padding: 12px 14px; border-top: 1px solid var(--panel-edge); align-items: center; }
  .approval:first-child { border-top: none; }
  .approval .why { color: var(--ink-3); font-size: 13px; }
  .actions { display: flex; gap: 8px; }
  .status-line { color: var(--ink-3); font-size: 13px; min-height: 1.2em; }
  .gauntlet-row { display: grid; grid-template-columns: minmax(280px, 380px) 1fr; gap: 6px 16px; padding: 11px 14px; border-top: 1px solid var(--panel-edge); align-items: start; }
  .gauntlet-row:first-child { border-top: none; }
  .gauntlet-row .name { font-weight: 600; display: flex; gap: 8px; align-items: baseline; }
  .gauntlet-row .name .badge { flex-shrink: 0; }
  .gauntlet-row .detail { color: var(--ink-2); font-size: 14px; }
  @media (max-width: 720px) { .gauntlet-row, .approval { grid-template-columns: 1fr; } }
  footer { margin-top: 40px; color: var(--ink-3); font-size: 13px; max-width: 78ch; }
  footer p { margin-top: 6px; }
</style>
</head>
<body>
<div class="topbar">
  <header>
    <h1 data-i18n="title">SOVEREIGN FOUNDER OS</h1>
    <div class="sub" data-i18n="stage"></div>
    <div class="honest" data-i18n="honest_intro"></div>
  </header>
  <div class="lang" role="group" aria-label="Language">
    <button id="lang-en">EN</button>
    <button id="lang-zh">中文</button>
  </div>
</div>

<nav class="tabs">
  <button id="tab-command" data-i18n="tab_command"></button>
  <button id="tab-workspace" data-i18n="tab_workspace"></button>
  <button id="tab-security" data-i18n="tab_security"></button>
</nav>

<!-- ══════════════════ COMMAND CENTER VIEW ══════════════════ -->
<div id="view-command" hidden>
  <section>
    <h2 data-i18n="cc_business_title"></h2>
    <div class="panel pad" id="cc-venture"><span class="empty" data-i18n="cc_no_venture"></span></div>
    <div class="tiles" style="margin-top:10px">
      <div class="tile"><div class="label" data-i18n="cc_customers"></div><div class="value" id="cc-customers">–</div><div class="meta" data-i18n="cc_customers_meta"></div></div>
      <div class="tile"><div class="label" data-i18n="cc_documents"></div><div class="value" id="cc-documents">–</div><div class="meta" id="cc-documents-meta"></div></div>
      <div class="tile"><div class="label" data-i18n="cc_pending"></div><div class="value" id="cc-pending">–</div><div class="meta" data-i18n="cc_pending_meta"></div></div>
      <div class="tile"><div class="label" data-i18n="cc_effects"></div><div class="value" id="cc-effects">–</div><div class="meta" id="cc-effects-meta"></div></div>
    </div>
  </section>

  <section>
    <h2 data-i18n="cc_guidance_title"></h2>
    <div class="honest" data-i18n="cc_guidance_note"></div>
    <div class="panel" style="margin-top:10px"><div id="cc-guidance" class="empty" data-i18n="loading"></div></div>
  </section>

  <section>
    <h2 data-i18n="cc_decisions_title"></h2>
    <div class="panel"><div id="cc-decisions" class="empty" data-i18n="cc_no_decisions"></div></div>
  </section>

  <section>
    <h2 data-i18n="cc_evidence_title"></h2>
    <div class="honest" data-i18n="cc_evidence_note"></div>
    <div class="tiles" style="margin-top:10px">
      <div class="tile"><div class="label" data-i18n="cc_chain"></div><div class="value" id="cc-chain">–</div><div class="meta" id="cc-chain-meta"></div></div>
      <div class="tile"><div class="label" data-i18n="cc_signed"></div><div class="value" id="cc-signed">–</div><div class="meta" data-i18n="cc_signed_meta"></div></div>
      <div class="tile"><div class="label" data-i18n="cc_disclosures"></div><div class="value" id="cc-disclosures">–</div><div class="meta" data-i18n="cc_disclosures_meta"></div></div>
      <div class="tile"><div class="label" data-i18n="cc_plugins"></div><div class="value" id="cc-plugins">–</div><div class="meta" data-i18n="cc_plugins_meta"></div></div>
    </div>
  </section>
</div>

<!-- ══════════════════ WORKSPACE VIEW ══════════════════ -->
<div id="view-workspace" hidden>
  <section>
    <h2 data-i18n="ws_venture_title"></h2>
    <div class="panel pad form-grid">
      <div><label data-i18n="ws_company_name"></label><input type="text" id="v-name" maxlength="200"></div>
      <div><label data-i18n="ws_service_desc"></label><textarea id="v-service" maxlength="2000"></textarea></div>
      <div class="toolbar">
        <button class="primary" id="v-save" data-i18n="ws_save"></button>
        <span class="status-line" id="v-status"></span>
      </div>
    </div>
  </section>

  <section>
    <h2 data-i18n="ws_customers_title"></h2>
    <div class="panel pad form-grid">
      <div class="form-row">
        <div><label data-i18n="ws_customer_name"></label><input type="text" id="c-name" maxlength="200"></div>
        <button class="primary" id="c-add" data-i18n="ws_add_customer"></button>
      </div>
      <div><label data-i18n="ws_customer_email"></label><input type="text" id="c-email" maxlength="254" placeholder="name@example.com"></div>
      <div><label data-i18n="ws_customer_notes"></label><input type="text" id="c-notes" maxlength="500"></div>
    </div>
    <div class="panel" style="margin-top:10px"><div id="customers" class="empty" data-i18n="ws_no_customers"></div></div>
  </section>

  <section>
    <h2 data-i18n="ws_documents_title"></h2>
    <div class="panel pad form-grid">
      <div class="toolbar">
        <div style="flex:1;min-width:200px"><label data-i18n="ws_for_customer"></label><select id="d-customer"></select></div>
        <div style="width:140px"><label data-i18n="ws_amount"></label><input type="text" id="d-amount" placeholder="2500.00"></div>
      </div>
      <div class="toolbar">
        <button class="primary" id="d-offer" data-i18n="ws_gen_offer"></button>
        <button class="primary" id="d-invoice" data-i18n="ws_gen_invoice"></button>
        <button class="ghost" id="d-assist" data-i18n="ws_assist"></button>
        <span class="status-line" id="d-status"></span>
      </div>
      <div class="status-line" data-i18n="ws_doc_note"></div>
      <div id="assist-box" hidden>
        <div class="toolbar" style="justify-content:space-between">
          <span class="badge warn" id="assist-label"></span>
          <button class="ghost small" id="assist-copy" data-i18n="ws_assist_copy"></button>
        </div>
        <textarea id="assist-text" readonly style="min-height:120px"></textarea>
        <div class="status-line" id="assist-meta"></div>
      </div>
    </div>
    <div class="panel" style="margin-top:10px"><div id="documents" class="empty" data-i18n="ws_no_documents"></div></div>
  </section>

  <section>
    <h2 data-i18n="ws_approvals_title"></h2>
    <div class="panel"><div id="approvals" class="empty" data-i18n="ws_no_approvals"></div></div>
  </section>

  <section>
    <h2 data-i18n="ws_backup_title"></h2>
    <div class="panel pad form-grid">
      <div class="toolbar">
        <a href="/api/export" download><button class="ghost" data-i18n="ws_export"></button></a>
        <span class="status-line" data-i18n="ws_export_note"></span>
      </div>
      <div class="status-line" data-i18n="ws_verify_note"></div>
      <div class="toolbar">
        <input type="file" id="verify-file" accept="application/json,.json">
        <button class="ghost" id="verify-btn" data-i18n="ws_verify"></button>
        <span class="status-line" id="verify-status"></span>
      </div>
      <div id="verify-report" class="panel pad" hidden></div>
    </div>
  </section>
</div>

<!-- ══════════════════ SECURITY VIEW ══════════════════ -->
<div id="view-security" hidden>
  <div class="tiles">
    <div class="tile"><div class="label" data-i18n="tile_device"></div><div class="value" id="t-device">–</div><div class="meta" id="t-device-meta"></div></div>
    <div class="tile"><div class="label" data-i18n="tile_events"></div><div class="value" id="t-events">–</div><div class="meta" id="t-chain"></div></div>
    <div class="tile"><div class="label" data-i18n="tile_vault"></div><div class="value" id="t-vault">–</div><div class="meta" data-i18n="vault_meta"></div></div>
    <div class="tile"><div class="label" data-i18n="tile_plugins"></div><div class="value" id="t-plugins">–</div><div class="meta" data-i18n="plugins_meta"></div></div>
  </div>

  <section>
    <h2 data-i18n="sec_plugins"></h2>
    <div class="panel"><div id="plugins" class="empty" data-i18n="loading"></div></div>
  </section>

  <section>
    <h2 data-i18n="sec_ledger"></h2>
    <div class="panel"><div id="ledger" class="empty" data-i18n="loading"></div></div>
  </section>

  <section>
    <h2 data-i18n="sec_gauntlet"></h2>
    <div class="toolbar">
      <button id="run" class="primary" data-i18n="btn_run"></button>
      <button id="refresh" class="ghost" data-i18n="btn_refresh"></button>
      <span class="mono" id="gauntlet-status"></span>
    </div>
    <div class="panel"><div id="gauntlet" class="empty" data-i18n="gauntlet_intro"></div></div>
  </section>
</div>

<footer>
  <p><strong data-i18n="footer_limits_title"></strong> <span data-i18n="footer_limits"></span></p>
</footer>

let lang = localStorage.getItem("sovereign-ui-lang")
  || (navigator.language && navigator.language.toLowerCase().startsWith("zh") ? "zh" : "en");
let view = localStorage.getItem("sovereign-ui-view") || "command";
let lastState = null;
let lastGauntlet = null;
let lastCommand = null;
let ws = null;

const $ = (id) => document.getElementById(id);
const t = (key) => STRINGS[lang][key];

function el(tag, className, text) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (text !== undefined) node.textContent = text;
  return node;
}

function badge(kind, label) {
  const marks = { good: "✓ ", bad: "✗ ", warn: "⧗ ", neutral: "" };
  return el("span", "badge " + kind, (marks[kind] || "") + label);
}

function table(headers, rows) {
  const tbl = el("table");
  const thead = el("thead"); const hr = el("tr");
  headers.forEach(h => hr.appendChild(el("th", null, h)));
  thead.appendChild(hr); tbl.appendChild(thead);
  const tbody = el("tbody");
  rows.forEach(cells => {
    const tr = el("tr");
    cells.forEach(cell => {
      if (cell instanceof Node) { const td = el("td"); td.appendChild(cell); tr.appendChild(td); }
      else { tr.appendChild(el("td", cell && cell.mono ? "mono" : null, cell && cell.mono ? cell.mono : cell)); }
    });
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody);
  return tbl;
}

const locale = () => lang === "zh" ? "zh-CN" : undefined;
const fmtTime = (unix) => new Date(unix * 1000).toLocaleString(locale());

async function api(path, body) {
  const response = await fetch(path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(Object.assign({ lang }, body || {})),
  });
  return response.json();
}

/* ─────────────── Workspace ─────────────── */

async function loadWorkspace() {
  const data = await (await fetch("/api/workspace")).json();
  if (data.ok) { ws = data.workspace; renderWorkspace(); }
}

function renderWorkspace() {
  if (!ws) return;
  if (ws.venture) {
    if (document.activeElement !== $("v-name")) $("v-name").value = ws.venture.name;
    if (document.activeElement !== $("v-service")) $("v-service").value = ws.venture.service;
  }

  const customers = $("customers");
  if (!ws.customers.length) {
    customers.replaceChildren(el("div", "empty", t("ws_no_customers")));
  } else {
    customers.replaceChildren(table(
      [t("th_customer"), t("th_email"), t("th_notes"), t("th_added")],
      ws.customers.map(c => [c.name, c.email || "—", c.notes, fmtTime(c.created_at)])));
  }

  const select = $("d-customer");
  const selected = select.value;
  select.replaceChildren(...ws.customers.map(c => {
    const option = el("option", null, c.name);
    option.value = c.id;
    return option;
  }));
  if (selected && ws.customers.some(c => c.id === selected)) select.value = selected;

  const documents = $("documents");
  if (!ws.documents.length) {
    documents.replaceChildren(el("div", "empty", t("ws_no_documents")));
  } else {
    documents.replaceChildren(...[...ws.documents].reverse().map(d => {
      const wrap = el("div", "doc");
      const head = el("div", "doc-head");
      head.appendChild(el("span", "badge neutral", t(d.kind === "offer" ? "kind_offer" : "kind_invoice")));
      head.appendChild(el("span", "title", d.title));
      const statusKind = { draft: "neutral", pending_approval: "warn", approved_pending_delivery: "good", rejected: "bad", revoked: "neutral" }[d.status] || "neutral";
      head.appendChild(badge(statusKind, t("status_" + d.status)));
      if (d.status === "draft") {
        const submit = el("button", "ghost small", t("ws_submit_send"));
        submit.addEventListener("click", async () => {
          const result = await api("/api/workspace/request-send", { document_id: d.id });
          if (result.ok) { ws = result.workspace; renderWorkspace(); }
          else $("d-status").textContent = result.error;
        });
        head.appendChild(submit);
      }
      if (d.status === "approved_pending_delivery") {
        const revoke = el("button", "ghost small", t("ws_revoke"));
        revoke.addEventListener("click", async () => {
          const result = await api("/api/workspace/revoke", { document_id: d.id });
          if (result.ok) { ws = result.workspace; renderWorkspace(); loadState(); }
          else $("d-status").textContent = result.error;
        });
        head.appendChild(revoke);
      }
      wrap.appendChild(head);
      const approvalWithEvidence = ws.approvals.find(a => a.document_id === d.id && a.evidence);
      if (approvalWithEvidence) {
        wrap.appendChild(el("div", "mono", t("ws_evidence")(approvalWithEvidence.evidence)));
        if (approvalWithEvidence.evidence.outbox) {
          wrap.appendChild(el("div", "mono", t("ws_outbox")(approvalWithEvidence.evidence.outbox)));
        }
      }
      const details = el("details");
      details.appendChild(el("summary", null, t("ws_view_content")));
      details.appendChild(el("pre", null, d.body));
      wrap.appendChild(details);
      return wrap;
    }));
  }

  const approvals = $("approvals");
  const pending = ws.approvals.filter(a => a.status === "pending");
  if (!pending.length) {
    approvals.replaceChildren(el("div", "empty", t("ws_no_approvals")));
  } else {
    approvals.replaceChildren(...pending.map(a => {
      const doc = ws.documents.find(d => d.id === a.document_id);
      const row = el("div", "approval");
      const info = el("div");
      info.appendChild(el("div", null, t("ws_approval_for") + (doc ? doc.title : a.document_id)));
      info.appendChild(el("div", "why", a.policy_reason));
      row.appendChild(info);
      const actions = el("div", "actions");
      const approve = el("button", "approve", "✓ " + t("ws_approve"));
      const reject = el("button", "reject", "✗ " + t("ws_reject"));
      const decide = async (yes) => {
        const result = await api("/api/workspace/decide", { approval_id: a.id, approve: yes });
        if (result.ok) { ws = result.workspace; renderWorkspace(); loadState(); }
      };
      approve.addEventListener("click", () => decide(true));
      reject.addEventListener("click", () => decide(false));
      actions.appendChild(approve); actions.appendChild(reject);
      row.appendChild(actions);
      return row;
    }));
  }
}

async function saveVenture() {
  const result = await api("/api/workspace/venture", { name: $("v-name").value, service: $("v-service").value });
  $("v-status").textContent = result.ok ? t("saved") : result.error;
  if (result.ok) { ws = result.workspace; renderWorkspace(); loadState(); }
}

async function addCustomer() {
  const result = await api("/api/workspace/customer", { name: $("c-name").value, email: $("c-email").value, notes: $("c-notes").value });
  if (result.ok) { $("c-name").value = ""; $("c-email").value = ""; $("c-notes").value = ""; ws = result.workspace; renderWorkspace(); loadState(); }
  else $("d-status").textContent = result.error;
}

async function draftAssist() {
  const customer_id = $("d-customer").value;
  if (!customer_id) { $("d-status").textContent = t("ws_no_customers"); return; }
  $("d-status").textContent = "…";
  const result = await api("/api/workspace/assist", { customer_id });
  if (!result.ok) { $("d-status").textContent = result.error; return; }
  $("d-status").textContent = "";
  const s = result.suggestion;
  $("assist-box").hidden = false;
  $("assist-label").textContent = t("ws_assist_label");
  $("assist-text").value = s.text;
  $("assist-meta").textContent = t("ws_assist_meta")(s);
  loadState();
}

async function createDocument(kind) {
  const body = { customer_id: $("d-customer").value };
  if (kind === "invoice") body.amount = $("d-amount").value;
  const result = await api("/api/workspace/" + kind, body);
  $("d-status").textContent = result.ok ? t("saved") : result.error;
  if (result.ok) { ws = result.workspace; renderWorkspace(); loadState(); }
}

/* ─────────────── Security Center ─────────────── */

function renderState() {
  const state = lastState;
  if (!state) return;
  $("t-device").textContent = state.device_id ? t("device_ready") : t("device_none");
  $("t-device-meta").textContent = state.device_id || t("device_hint");
  $("t-events").textContent = state.ledger.count;
  $("t-chain").replaceChildren(
    state.ledger.present
      ? badge(state.ledger.chain_ok ? "good" : "bad", state.ledger.chain_ok ? t("chain_ok") : t("chain_broken"))
      : el("span", null, t("no_ledger_tile")));
  $("t-vault").textContent = state.vault_entries.length;
  $("t-plugins").textContent = state.plugins.length;

  const plugins = $("plugins");
  if (!state.plugins.length) {
    plugins.replaceChildren(el("div", "empty", t("plugins_empty")));
  } else {
    plugins.replaceChildren(table(
      [t("th_status"), t("th_component"), t("th_manifest"), t("th_risk"), t("th_backend"), t("th_admitted_by")],
      state.plugins.map(p => p.verified
        ? [badge("good", t("verified")), {mono: p.component_digest + "…"}, {mono: p.manifest_digest + "…"},
           String(p.risk_class), String(p.backend), p.issuer]
        : [badge("bad", t("unverified")), {mono: p.manifest_digest + "…"}, "", "", "", p.error])));
  }

  const ledger = $("ledger");
  if (!state.ledger.present || (state.ledger.chain_ok && !state.ledger.events.length)) {
    ledger.replaceChildren(el("div", "empty", t("ledger_empty")));
  } else if (!state.ledger.chain_ok) {
    const wrap = el("div", "empty");
    wrap.appendChild(badge("bad", t("ledger_broken")));
    wrap.appendChild(el("div", "mono", state.ledger.error || ""));
    ledger.replaceChildren(wrap);
  } else {
    ledger.replaceChildren(table(
      [t("th_time"), t("th_actor"), t("th_action"), t("th_resource"), t("th_hash")],
      state.ledger.events.map(e =>
        [new Date(e.timestamp).toLocaleString(locale()), e.actor, e.action, e.resource, {mono: e.hash + "…"}])));
  }
}

function renderGauntlet() {
  if (!lastGauntlet) return;
  const box = $("gauntlet");
  box.classList.remove("empty");
  box.replaceChildren(...lastGauntlet.map(r => {
    const localized = STRINGS[lang].attacks[r.key];
    const row = el("div", "gauntlet-row");
    const name = el("div", "name");
    name.appendChild(badge(r.pass ? "good" : "bad", r.pass ? t("held") : t("failed")));
    name.appendChild(document.createTextNode(" " + (localized ? localized.name : r.name)));
    row.appendChild(name);
    row.appendChild(el("div", "detail", localized ? localized.detail : r.detail));
    return row;
  }));
  const failed = lastGauntlet.filter(r => !r.pass).length;
  $("gauntlet-status").textContent = failed ? t("violated")(failed) : t("all_held")(lastGauntlet.length);
}

async function loadState() {
  try {
    lastState = await (await fetch("/api/state")).json();
    renderState();
  } catch (error) {
    $("stage") && ($("stage").textContent = t("state_failed") + error);
  }
}

async function runGauntlet() {
  const button = $("run");
  button.disabled = true;
  $("gauntlet-status").textContent = t("running");
  try {
    const data = await api("/api/gauntlet");
    if (!data.ok) {
      $("gauntlet").replaceChildren(el("div", "empty", t("gauntlet_error") + data.error));
    } else {
      lastGauntlet = data.results;
      renderGauntlet();
    }
  } catch (error) {
    $("gauntlet-status").textContent = t("request_failed") + error;
  } finally {
    button.disabled = false;
  }
}

/* ─────────────── Backup verification ─────────────── */

async function verifyBackup() {
  const input = $("verify-file");
  const status = $("verify-status");
  const reportBox = $("verify-report");
  const file = input.files && input.files[0];
  if (!file) { status.textContent = t("ws_verify_pick"); return; }
  status.textContent = t("ws_verify_reading");
  reportBox.hidden = true;
  let bundle;
  try {
    bundle = JSON.parse(await file.text());
  } catch (error) {
    status.textContent = t("ws_verify_badfile");
    return;
  }
  status.textContent = t("ws_verify_checking");
  try {
    const data = await api("/api/verify-export", { bundle });
    if (!data.ok) { status.textContent = data.error || t("ws_verify_fail"); return; }
    status.textContent = "";
    renderVerifyReport(data.report);
  } catch (error) {
    status.textContent = t("request_failed") + error;
  }
}

function renderVerifyReport(r) {
  const box = $("verify-report");
  box.hidden = false;
  const mark = (ok) => badge(ok ? "good" : "bad", ok ? t("ws_verify_pass_word") : t("ws_verify_fail_word"));
  const chain = el("span");
  chain.appendChild(mark(r.audit_chain_verified));
  chain.appendChild(document.createTextNode(" · " + t("ws_verify_events")(r.audit_events)));
  const rows = [
    [t("ws_verify_row_format"), mark(r.format_ok)],
    [t("ws_verify_row_identity"), mark(r.identity_bound)],
    [t("ws_verify_row_chain"), chain],
    [t("ws_verify_row_state"), el("span", null, t("ws_verify_state")(r))],
    [t("ws_verify_device"), el("span", "mono", r.device_id || "—")],
  ];
  const verdict = el("div");
  verdict.appendChild(badge(r.ok ? "good" : "bad", r.ok ? t("ws_verify_pass") : t("ws_verify_fail")));
  const children = [verdict];
  rows.forEach(([label, node]) => {
    const row = el("div", "toolbar");
    row.appendChild(el("span", "status-line", label));
    row.appendChild(node);
    children.push(row);
  });
  (r.notes || []).forEach(note => children.push(el("div", "status-line", "• " + note)));
  box.replaceChildren(...children);
}

/* ─────────────── Command Center ─────────────── */

async function loadCommandCenter() {
  try {
    lastCommand = await (await fetch("/api/command-center")).json();
    renderCommandCenter();
  } catch (error) { /* leave placeholders; other views still work */ }
}

function renderCommandCenter() {
  if (!lastCommand || !lastCommand.ok) return;
  const s = lastCommand.summary;
  const k = lastCommand.kernel;

  const vbox = $("cc-venture");
  if (s.venture) vbox.replaceChildren(el("div", "mono", t("cc_venture_line")(s.venture)));
  else vbox.replaceChildren(el("span", "empty", t("cc_no_venture")));

  $("cc-customers").textContent = s.counts.customers;
  $("cc-documents").textContent = s.counts.documents;
  $("cc-documents-meta").textContent = t("cc_documents_meta")(s.counts);
  $("cc-pending").textContent = s.pending_decisions.length;
  $("cc-effects").textContent = s.evidence.outbox_effects;
  $("cc-effects-meta").textContent = t("cc_effects_meta")(s.evidence);

  const chainEl = $("cc-chain");
  if (!k.audit_chain_present) { chainEl.textContent = t("cc_chain_none"); chainEl.style.color = ""; }
  else if (k.audit_chain_ok) { chainEl.textContent = t("cc_chain_verified"); chainEl.style.color = "var(--good)"; }
  else { chainEl.textContent = t("cc_chain_broken"); chainEl.style.color = "var(--critical)"; }
  $("cc-chain-meta").textContent = t("cc_events")(k.audit_events);
  $("cc-signed").textContent = s.evidence.signed_approvals;
  $("cc-disclosures").textContent = k.model_disclosures;
  $("cc-plugins").textContent = k.admitted_plugins;

  renderCommandGuidance(s.guidance);
  renderCommandDecisions(s.pending_decisions);
}

function renderCommandGuidance(items) {
  const box = $("cc-guidance");
  if (!items || !items.length) {
    box.className = "empty";
    box.replaceChildren(document.createTextNode(t("cc_no_guidance")));
    return;
  }
  box.className = "";
  box.replaceChildren(...items.map(g => {
    const row = el("div", "pad");
    const bar = el("div", "toolbar");
    const risk = g.kind_class === "risk";
    bar.appendChild(badge(risk ? "warn" : "neutral", risk ? t("cc_risk_word") : t("cc_step_word")));
    bar.appendChild(el("span", null, t("cc_guidance")(g)));
    row.appendChild(bar);
    return row;
  }));
}

function renderCommandDecisions(decisions) {
  const box = $("cc-decisions");
  if (!decisions.length) {
    box.className = "empty";
    box.replaceChildren(document.createTextNode(t("cc_no_decisions")));
    return;
  }
  box.className = "";
  box.replaceChildren(...decisions.map(d => {
    const row = el("div", "pad");
    row.appendChild(el("div", null, t("cc_decision_line")(d)));
    if (d.policy_reason) row.appendChild(el("div", "status-line", d.policy_reason));
    const bar = el("div", "toolbar");
    const approve = el("button", "primary small", t("cc_approve"));
    approve.addEventListener("click", () => commandDecide(d.approval_id, true));
    const reject = el("button", "ghost small", t("cc_reject"));
    reject.addEventListener("click", () => commandDecide(d.approval_id, false));
    bar.appendChild(approve);
    bar.appendChild(reject);
    row.appendChild(bar);
    return row;
  }));
}

async function commandDecide(approvalId, approve) {
  const result = await api("/api/workspace/decide", { approval_id: approvalId, approve });
  if (result.ok) { ws = result.workspace; renderWorkspace(); }
  await loadCommandCenter();
  await loadState();
}

/* ─────────────── Shell ─────────────── */

function applyLanguage() {
  document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
  $("lang-en").classList.toggle("active", lang === "en");
  $("lang-zh").classList.toggle("active", lang === "zh");
  document.querySelectorAll("[data-i18n]").forEach(node => {
    const value = t(node.dataset.i18n);
    if (typeof value === "string") node.textContent = value;
  });
  renderState();
  renderGauntlet();
  renderWorkspace();
  renderCommandCenter();
}

function setLanguage(next) {
  lang = next;
  localStorage.setItem("sovereign-ui-lang", next);
  applyLanguage();
}

function setView(next) {
  view = next;
  localStorage.setItem("sovereign-ui-view", next);
  $("view-command").hidden = next !== "command";
  $("view-workspace").hidden = next !== "workspace";
  $("view-security").hidden = next !== "security";
  $("tab-command").classList.toggle("active", next === "command");
  $("tab-workspace").classList.toggle("active", next === "workspace");
  $("tab-security").classList.toggle("active", next === "security");
  if (next === "command") loadCommandCenter();
}

$("lang-en").addEventListener("click", () => setLanguage("en"));
$("lang-zh").addEventListener("click", () => setLanguage("zh"));
$("tab-command").addEventListener("click", () => setView("command"));
$("tab-workspace").addEventListener("click", () => setView("workspace"));
$("tab-security").addEventListener("click", () => setView("security"));
$("v-save").addEventListener("click", saveVenture);
$("c-add").addEventListener("click", addCustomer);
$("d-assist").addEventListener("click", draftAssist);
$("assist-copy").addEventListener("click", () => {
  const text = $("assist-text").value;
  if (navigator.clipboard) navigator.clipboard.writeText(text).catch(() => {});
  else { $("assist-text").select(); document.execCommand("copy"); }
  $("assist-copy").textContent = t("ws_assist_copied");
  setTimeout(() => { $("assist-copy").textContent = t("ws_assist_copy"); }, 1500);
});
$("verify-btn").addEventListener("click", verifyBackup);
$("d-offer").addEventListener("click", () => createDocument("offer"));
$("d-invoice").addEventListener("click", () => createDocument("invoice"));
$("run").addEventListener("click", runGauntlet);
$("refresh").addEventListener("click", loadState);

applyLanguage();
setView(view);
loadState();
loadWorkspace();
loadCommandCenter();
</script>
</body>
</html>
